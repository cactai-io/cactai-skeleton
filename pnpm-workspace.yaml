# Not a monorepo — this file carries pnpm settings only.
# @cactai-io/* installs from GitHub Packages (see .npmrc); the freshness check
# is excluded for the first-party scope so a fresh publish installs immediately.
allowBuilds:
  esbuild: true
  sharp: true
minimumReleaseAgeExclude:
  - '@cactai-io/*'
