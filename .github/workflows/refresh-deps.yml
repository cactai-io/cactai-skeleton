name: Refresh @cactai-io lockfile

# Re-resolves the seven published @cactai-io/* deps to the newest version
# within the committed ^1.4.0 range and commits the refreshed pnpm-lock.yaml,
# so a freshly-forked app installs the latest SDK without anyone hand-running
# the update. Only the lockfile's resolved `version:` lines move; the
# `specifier: ^1.4.0` lines and package.json ranges are left untouched.
#
# IMPORTANT: this uses `pnpm update` (NOT `pnpm install`, NOT `--latest`).
#   - `pnpm install` is a no-op for version bumps: if the locked version
#     already satisfies the range (1.4.1 satisfies ^1.4.0), pnpm keeps it
#     and never advances to 1.4.3. That is the bug this file used to have.
#   - `pnpm update` (no --latest) advances the resolved version to the
#     highest within the existing ^1.4.0 range. It DOES, however, rewrite
#     the package.json specifier to the new version (e.g. ^1.4.0 -> ^1.4.3),
#     which would let the floor creep and, if left uncommitted, desync
#     package.json from the lockfile (ERR_PNPM_OUTDATED_LOCKFILE on the next
#     frozen install). So the run step restores package.json after the
#     update and reconciles the lockfile's importer specifiers back to
#     ^1.4.0 with a lockfile-only install — the freshly resolved versions
#     survive because they still satisfy ^1.4.0.
#   - `--latest` is even more aggressive (ignores the range entirely). Never
#     use it here.
# Scoped to "@cactai-io/*" so third-party deps (and their minimum-release-age
# protection) are left alone and diffs stay small.
#
# Note: a stale LOCAL pnpm metadata cache can hide a just-published version
# (pnpm won't refetch the version list it cached during an earlier install).
# CI is immune — fresh runner, empty cache — but if you run this by hand and
# the bump doesn't appear, clear the pnpm cache dir first (`pnpm store path`
# is the content store; the metadata cache is under `pnpm config get cacheDir`).
#
# Triggers:
#   - workflow_dispatch: hit "Run workflow" right after publishing a new
#     @cactai-io release so the template picks it up immediately.
#   - schedule: a weekly safety net in case a manual run is forgotten.
#
# Prerequisites (one-time, owner-only — this workflow is inert without them):
#   1. Repo Actions secret CACTAI_NPM_TOKEN with read:packages on the
#      @cactai-io scope (same token the local .npmrc resolves).
#   2. The bot push to main must be permitted by branch protection. If
#      `main` requires status checks, either allow the github-actions bot to
#      bypass, or this workflow's push step will fail.

on:
  workflow_dispatch:
  # Auto-fired by the platform's publish-public-packages workflow on every
  # successful tag publish (event_type: cactai-packages-published). With the
  # platform-side PAT wired, a new @cactai-io/* release triggers this within
  # seconds — no manual click and no waiting for the weekly cron.
  repository_dispatch:
    types: [cactai-packages-published]
  schedule:
    - cron: '0 9 * * 1'

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 11

      - uses: actions/setup-node@v4
        with:
          # pnpm 11.5+ requires Node 22+ (it imports node:sqlite). Bumping
          # from 20 → 22 unblocks the refresh step; also aligns with GitHub's
          # Node 20 actions-runner deprecation that lands 2026-06-16.
          node-version: 22
          registry-url: https://npm.pkg.github.com

      - name: Re-resolve @cactai-io deps to newest within range
        env:
          CACTAI_NPM_TOKEN: ${{ secrets.CACTAI_NPM_TOKEN }}
        run: |
          set -euo pipefail
          pnpm update --lockfile-only "@cactai-io/*"
          git checkout -- package.json
          pnpm install --lockfile-only

      - name: Commit refreshed lockfile if it changed
        run: |
          set -euo pipefail
          if git diff --quiet -- pnpm-lock.yaml; then
            echo "Lockfile already at the newest 1.4.x — nothing to commit."
            exit 0
          fi
          git config user.name  "cactai-bot"
          git config user.email "bot@cactai.io"
          git add pnpm-lock.yaml
          git commit -m "build: refresh @cactai-io lockfile to latest 1.4.x"
          git push
