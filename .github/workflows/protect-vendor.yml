name: Protect vendor package.json
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Enforces that vendored @cactai-io/* package.json files never carry
# `workspace:*` specifiers.
#
# Why this guard exists: the skeleton consumes vendored mui + devshell via
# file:./vendor/@cactai-io/<pkg>. The skeleton is NOT a pnpm workspace, so
# any `workspace:*` dep inside a vendor package.json hard-fails the next
# refresh-deps run with ERR_PNPM_WORKSPACE_PKG_NOT_FOUND. The
# platform-side sync-vendor.mjs script rewrites workspace:* automatically
# when it produces vendor copies — this workflow catches any commit where
# someone bypassed the script and hand-edited (or copied) a vendor
# package.json with workspace:* intact.
#
# Together with sync-vendor.mjs's rewriter, this closes the recurring
# "label refresh undid the workspace:* trim" failure mode that broke
# refresh-deps multiple times (986e236 → 776b46d → 62f3755).

jobs:
  protect-vendor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify no workspace:* in vendor package.json files
        run: |
          set -euo pipefail
          BAD=$(grep -RHn '"workspace:\*"' vendor/@cactai-io/*/package.json 2>/dev/null || true)
          if [ -n "$BAD" ]; then
            echo "::error::workspace:* specifier found in a vendored package.json — these can't resolve outside the platform monorepo and will break the next pnpm install."
            echo "$BAD" | while IFS= read -r line; do
              file=${line%%:*}
              echo "::error file=$file::$line"
            done
            echo ""
            echo "Fix: run \`pnpm run sync:vendor\` from cactai-platform, which rewrites workspace:* to file:../<sibling> (for vendored pkgs) or ^<version> (for published pkgs). Then commit the regenerated vendor files."
            exit 1
          fi
          echo "✓ no workspace:* leaks in vendor/@cactai-io/*/package.json"
